apply plugin: 'com.android.application'

android {
    namespace = "com.pall.network"
    compileSdk = rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.pall.network"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        multiDexEnabled true

        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    buildFeatures {
        buildConfig true
    }

    flavorDimensions "version"

    productFlavors {

        dev {
            dimension "version"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"

            buildConfigField "String", "BASE_URL", "\"https://pall-network-auth-dev.onrender.com\""
            buildConfigField "String", "FIREBASE_APP_ID", "\"1:56754671423:android:8813b6ed7c21dd1bf58d8a\""
            buildConfigField "String", "ADMOB_APP_ID", "\"ca-app-pub-3940256099942544~3347511713\""

            buildConfigField "String", "BANNER_AD_UNIT_ID", "\"ca-app-pub-3940256099942544/6300978111\""
            buildConfigField "String", "INTERSTITIAL_AD_UNIT_ID", "\"ca-app-pub-3940256099942544/1033173712\""
            buildConfigField "String", "REWARDED_AD_UNIT_ID", "\"ca-app-pub-3940256099942544/5224354917\""

            // ✅ FIX
            manifestPlaceholders = [
                    ADMOB_APP_ID: "ca-app-pub-3940256099942544~3347511713"
            ]
        }

        production {
            dimension "version"

            buildConfigField "String", "BASE_URL", "\"https://pall-network-auth.onrender.com\""
            buildConfigField "String", "FIREBASE_APP_ID", "\"1:785443894438:android:f17df5db03ae2adef4b067\""
            buildConfigField "String", "ADMOB_APP_ID", "\"ca-app-pub-2948353344588284~1245466776\""

            buildConfigField "String", "BANNER_AD_UNIT_ID", "\"ca-app-pub-2948353344588284/3121778931\""
            buildConfigField "String", "INTERSTITIAL_AD_UNIT_ID", "\"ca-app-pub-2948353344588284/7751273179\""
            buildConfigField "String", "REWARDED_AD_UNIT_ID", "\"ca-app-pub-2948353344588284/7468382661\""

            // ✅ FIX
            manifestPlaceholders = [
                    ADMOB_APP_ID: "ca-app-pub-2948353344588284~1245466776"
            ]
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"

    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')

    implementation 'com.google.android.gms:play-services-ads:22.2.0'

    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found")
}